  <!-- ✅ FIX: Set lang/dir from localStorage BEFORE CSS loads to prevent font flash on refresh -->
  <script>
    (function () {
      try {
        var lang = localStorage.getItem("snowball-language");
        if (lang !== "en" && lang !== "ar") lang = "en";
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
        document.documentElement.setAttribute("data-language", lang);
      } catch (e) {}
    })();
  </script>
</head>
